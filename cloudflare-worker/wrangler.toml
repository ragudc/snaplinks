# ─── Worker identity ─────────────────────────────────────────────
name               = "snaplinks-worker"
main               = "src/index.ts"
compatibility_date = "2024-11-01"

# ─── Workers.dev deployment ───────────────────────────────────────
# The Worker is available at:
# https://snaplinks-worker.YOUR_SUBDOMAIN.workers.dev
workers_dev = true

# ─── Secrets (set via `wrangler secret put`, never stored here) ───
# SUPABASE_URL             — Supabase project URL
# SUPABASE_SERVICE_ROLE_KEY — Supabase service role key
# NEXT_APP_URL             — Production Next.js app URL
#
# To set each secret:
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put NEXT_APP_URL

# ─── Custom domain (optional — uncomment when you have a domain) ──
# Requires the domain to be managed by Cloudflare DNS.
# [[routes]]
# pattern   = "go.yourdomain.com/*"
# zone_name = "yourdomain.com"

# ─── Local development ────────────────────────────────────────────
# Copy .dev.vars.example to .dev.vars and fill in credentials.
# Run: wrangler dev --local
[dev]
port           = 8787
local_protocol = "http"

# ─── Observability ────────────────────────────────────────────────
[observability]
enabled = true
